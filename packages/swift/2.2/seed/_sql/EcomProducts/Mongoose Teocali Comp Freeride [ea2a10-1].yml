"ProductName": "Mongoose Teocali Comp Freeride"
"ProductShortDescription": |
  <p>No matter what the trail throws your way, this bike will give you the confidence to tackle what&rsquo;s ahead. Freeride suspension platform delivers smooth, bob-free pedaling while the adjustable rear travel soaks up the rough stuff. Shimano/SRAM drivetrain and FSA cranks will keep you in control on the ascents and the disc brakes will keep you in check on the descents. WTB rims with Kenda tires for added grip in the corners.</p>
"ProductLongDescription": |
  <ul>
  	<li>Lightweight and durable aluminum frame provides solid performance</li>
  	<li>SR Suntour front and rear adjustable suspension brings true MTB performance to the trail</li>
  	<li>Shimano/SRAM drivetrain with FSA cranks offers durable, reliable, all-around performance</li>
  	<li>Tektro hydraulic disc brakes provide low maintenance, all-weather stopping power in any terrain</li>
  </ul>

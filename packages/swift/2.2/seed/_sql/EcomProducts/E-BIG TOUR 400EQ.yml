"ProductName": "E-BIG TOUR 400EQ"
"ProductShortDescription": "<p><strong>MOUNTAIN BIKE TREKKING AT ITS BEST </strong><br>The eBIG.TOUR EQ combines the best of two worlds in the MERIDA line-up. From the outside a mountain bike but a trekking bike at heart. With a frame based on the eBIG.NINE, a suspension fork and wider 29er MTB tyres, the bike delivers a more comfortable riding feeling than a conventional trekking bike. However, as it comes fully equipped with fenders, carrier and lights, it is ideal for all tasks and duties you normally expect from a trekking bike or hybrid. The heavily bent down top tube offers incredible stand over height for easy mount and dismount.</p>"

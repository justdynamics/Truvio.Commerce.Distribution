"ProductName": "Pearl Izumi Women’s Symphony Jacket"
"ProductShortDescription": |
  <p>Just one look out your window on a cold and dreary morning is enough to make you want to pull the bedcovers right over your head! But Pearl Izumi has designed a lightweight jacket with full weather protection that&rsquo;ll make tackling those grey days a lot easier and a lot more comfortable.</p>
"ProductLongDescription": |
  <ul>
  	<li>Optik-WxB fabric provides waterproof, windproof and breathable protection in all kinds of foul weather</li>
  	<li>Full front zipper with internal rain flap seals out water and puts generous ventilation within easy reach</li>
  	<li>Detachable hood with its own stow pocket and elasticized sleeve openings retain heat while blocking the elements</li>
  	<li>Feminine reflective elements and piping enhance visibility in low light</li>
  </ul>

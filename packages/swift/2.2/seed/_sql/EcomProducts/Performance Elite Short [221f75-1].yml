"ProductName": "Performance Elite Short"
"ProductShortDescription": "<p>Uanset om det er din tidlige AM -pendling til arbejde, en ugentlig aftenklubtur eller en langdistancetur i weekenden, har du brug for en short, der kan gå distancen. Så vi kombinerede de bedste tekniske egenskaber med et blødt stof og komforten i en førsteklasses vaskeskind til ét &quot;go overalt, gør hvad som helst&quot; kort!</p>"
"ProductLongDescription": "<ul><li>Nylon/spandex konstruktion leverer den rigtige mængde kompression til hårdtarbejdende muskler, transporterer hurtigt sved væk og føles godt mod din hud</li><li> Otte formede paneler krammer dine ben for forbedret aerodynamik og ydeevne</li><li> Italiensk fremstillet Quadrotto-vaskeskind med 4-vejs stretch giver komfortabel dæmpning og bruger en sølvionfinish til antibakteriel beskyttelse</li><li> Flatlock-sømme eliminerer gnidning og giver en glat, ikke-irriterende fornemmelse</li><li> Gribebenåbninger holder denne korte på plads</li></ul>"

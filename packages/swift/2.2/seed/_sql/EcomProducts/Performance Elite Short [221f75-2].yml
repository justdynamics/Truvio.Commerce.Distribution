"ProductName": "Performance Elite Short"
"ProductShortDescription": "<p>Whether it&rsquo;s your early A.M. commute to work, a weekly evening club ride or a long distance tour on the weekend, you need a short that can go the distance. So we combined the best technical properties with a soft feeling fabric and the comfort of a premium chamois into one &ldquo;go anywhere, do anything&rdquo; short!</p>"
"ProductLongDescription": |-
  <ul>
  <li>Nylon/spandex construction supplies the right amount of compression for hard working muscles, quickly wicks away sweat and feels great against your skin</li>
  <li>Eight contoured panels hug your legs for enhanced aerodynamics and performance</li>
  <li>Italian made, Quadrotto chamois with 4-way stretch offers comfortable cushioning and uses a silver ion finish for antibacterial protection</li>
  <li>Flatlock seams eliminate chafing and provide a smooth, non-irritating feel</li>
  <li>Gripper leg openings keep this short in place</li>
  </ul>

"ProductShortDescription": "<p><strong>LEICHTGEWICHTIGES RENNEN-RAD</strong><br>Unser leichtes Rennrad ist auf dem neuesten Stand der Technik und hat das Team Bahrain McLaren zu World-Tour-Siegen geführt. Unser klassisches Rennrad ist in zwei verschiedenen Geometrien und als Scheibenbremsen- oder Felgenbremsen-Option erhältlich und kombiniert erstklassigen Komfort mit windhundartiger Beschleunigung und bergauf-etappengewinnender Erfahrung. Das Cycling Plus-Magazin nennt es „ein Stück legendäres Rennrad“.</p>"
"ProductLongDescription": |-
  <ul>
  <li>SHIMANO DIRECT HANGER – Unser CF4-Rahmen verfügt über den Shimano Direct Hanger für eine stabilere Verbindung zwischen Rahmen und Schaltwerk, was zu weiter verbesserten Schaltvorgängen und einfacheren (und damit schnelleren) Radwechseln führt.</li>
  <li>REIFENFREIHEIT SCULTURA DISC – Die SCULTURA DISC-Version kann mit 28 mm breiten Reifen ausgestattet werden, was maximale Traktion bietet und die verbesserte Bremskraft auf die Straße überträgt. Die maximale Reifenbreite für die Felgenversion beträgt 25 mm.</li>
  <li>STECKACHSEN – Die 12 mm Steckachsen sorgen für höhere Radsteifigkeit und präzise Scheibenausrichtung beim Radwechsel. Der kundenspezifische Achshebel ist abnehmbar und verfügt über einen 4 mm Inbusschlüssel, sodass beispielsweise Vorbau- und Sattelstützenklemmen festgezogen und gelöst werden können.&nbsp;</li>
  </ul>
